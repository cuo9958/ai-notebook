<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>运行日志</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        background: #171411;
        color: #f6eadc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 10%, rgba(170, 74, 43, 0.24), transparent 32%),
          linear-gradient(135deg, #1d1915, #100f0d);
      }

      .shell {
        display: flex;
        height: 100vh;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(246, 234, 220, 0.14);
        padding: 14px 18px;
        background: rgba(24, 20, 17, 0.92);
      }

      p,
      h1 {
        margin: 0;
      }

      .eyebrow {
        margin-bottom: 4px;
        color: #e7a36d;
        font-family: Consolas, monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 22px;
        font-weight: 800;
      }

      .actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .count,
      button {
        border: 1px solid rgba(246, 234, 220, 0.16);
        background: rgba(255, 247, 239, 0.08);
        color: #f6eadc;
        padding: 8px 12px;
        font-size: 12px;
      }

      button {
        cursor: pointer;
      }

      #logs {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 12px;
      }

      .item,
      .empty {
        border: 1px solid rgba(246, 234, 220, 0.12);
        background: rgba(255, 247, 239, 0.05);
        padding: 12px 14px;
      }

      .item + .item {
        margin-top: 10px;
      }

      .item[data-level="error"] {
        border-color: rgba(225, 94, 67, 0.42);
        background: rgba(180, 62, 36, 0.14);
      }

      .item[data-level="success"] {
        border-color: rgba(88, 168, 114, 0.38);
        background: rgba(88, 168, 114, 0.1);
      }

      .meta {
        display: flex;
        gap: 8px;
        margin-bottom: 6px;
        color: rgba(246, 234, 220, 0.68);
        font-family: Consolas, monospace;
        font-size: 11px;
        text-transform: uppercase;
      }

      strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .detail,
      .empty {
        color: rgba(246, 234, 220, 0.82);
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">Debug Console</p>
          <h1>运行日志</h1>
        </div>
        <div class="actions">
          <span id="count" class="count">共 0 条</span>
          <button id="clear" type="button">清空</button>
        </div>
      </header>
      <section id="logs">
        <div class="empty">等待新的日志事件。</div>
      </section>
    </main>

    <script>
      const logs = []
      const logsEl = document.getElementById('logs')
      const countEl = document.getElementById('count')
      const clearEl = document.getElementById('clear')

      function formatTime(value) {
        const date = new Date(value)
        if (Number.isNaN(date.getTime())) return value || ''
        return date.toLocaleString('zh-CN', {
          hour12: false,
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
        })
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      function render() {
        countEl.textContent = `共 ${logs.length} 条`

        if (!logs.length) {
          logsEl.innerHTML = '<div class="empty">等待新的日志事件。</div>'
          return
        }

        logsEl.innerHTML = logs
          .map(
            (log) => `
              <article class="item" data-level="${escapeHtml(log.level)}">
                <div class="meta">
                  <span>${escapeHtml(formatTime(log.timestamp))}</span>
                  <span>${escapeHtml(log.source)}</span>
                  <span>${escapeHtml(log.level)}</span>
                </div>
                <strong>${escapeHtml(log.action)}</strong>
                ${log.detail ? `<div class="detail">${escapeHtml(log.detail)}</div>` : ''}
              </article>
            `,
          )
          .join('')
      }

      function addLog(payload) {
        logs.unshift({
          timestamp: payload.timestamp || new Date().toISOString(),
          source: payload.source || 'frontend',
          level: payload.level || 'info',
          action: payload.action || 'unknown',
          detail: payload.detail || '',
        })
        logs.splice(500)
        render()
      }

      clearEl.addEventListener('click', () => {
        logs.length = 0
        render()
      })

      async function bindTauriEvents() {
        const eventApi = window.__TAURI__ && window.__TAURI__.event
        if (!eventApi) {
          logsEl.innerHTML = '<div class="empty">日志窗口初始化失败：未找到 Tauri event API。</div>'
          return
        }

        await eventApi.listen('app-debug-log', (event) => addLog(event.payload))
        await eventApi.listen('app-frontend-debug-log', (event) => addLog(event.payload))
        await eventApi.listen('app-debug-clear', () => {
          logs.length = 0
          render()
        })
      }

      render()
      bindTauriEvents()
    </script>
  </body>
</html>
